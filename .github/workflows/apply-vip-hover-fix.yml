name: Apply VIP hover fix

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  apply-fix:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'vip-hover-fix-v28-build'
    runs-on: ubuntu-latest

    steps:
      - name: Check out fix branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply source patch
        run: |
          git apply --check scripts/vip-hover-fix-v28.patch
          git apply scripts/vip-hover-fix-v28.patch
          rm scripts/vip-hover-fix-v28.patch

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build bundle
        run: npm run build

      - name: Commit fix to branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix VIP+ icon hover isolation"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
